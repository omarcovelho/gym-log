name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      front: ${{ steps.filter.outputs.front }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            front:
              - 'front/**'
            workflows:
              - '.github/**'

  api:
    name: api
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gym
          POSTGRES_PASSWORD: gym
          POSTGRES_DB: gymlog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gym -d gymlog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://gym:gym@localhost:5432/gymlog
      JWT_SECRET: ci-test-secret
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3000/api/auth/google/callback
      FRONTEND_URL: http://localhost:5173
      RESEND_API_KEY: ci-resend-api-key
      EMAIL_FROM: ci@example.com
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-admin-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npm run lint:ci
      - run: npm run build
      - run: npm test
      - run: npm run migrate:deploy:ci
      - run: npm run test:e2e

  front:
    name: front
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.front == 'true' ||
      needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [api, front]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
