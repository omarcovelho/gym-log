name: Dependency review

on:
  pull_request:
    branches: [develop, master]

permissions:
  contents: read

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630cea3296fbb84b0592936f83 # v4.2.2
      - uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e68ddae65f454d # v4.5.0
        with:
          fail-on-severity: high
