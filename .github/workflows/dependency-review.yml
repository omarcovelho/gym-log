name: Dependency review

on:
  pull_request:
    branches: [develop, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # Skip (don't fail) when Dependency graph is disabled in repo settings.
          # Enable it for full PR dependency diff scanning:
          # https://github.com/omarcovelho/gym-log/settings/security_analysis
          fail-on-unsupported-repos: false
