title = "gym-log gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "CI and local dev placeholder values"
paths = [
  '''\.github/workflows/.*''',
  '''docker-compose\.yaml''',
  '''api/\.env\.example''',
  '''api/README\.md''',
]

[[allowlists]]
description = "CI placeholder secret values in workflows"
regexTarget = "match"
regexes = [
  '''ci-test-secret''',
  '''ci-google-client-id''',
  '''ci-google-client-secret''',
  '''ci-resend-api-key''',
  '''ci-admin-password''',
  '''ci@example\.com''',
]

[[allowlists]]
description = "Docker compose dev database credentials"
regexTarget = "match"
regexes = [
  '''POSTGRES_PASSWORD:\s*gym''',
  '''POSTGRES_USER:\s*gym''',
]
